<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WanderLodge | Vacation Rentals, Cabins, Beach Houses, & More</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Find the perfect place to stay at an amazing price in 191 countries. Belong anywhere with WanderLodge. Book unique homes, experiences, and places around the world." />
    <meta name="keywords" content="WanderLodge, vacation rentals, cabins, beach houses, unique homes, travel, booking" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WanderLodge | Vacation Rentals, Cabins, Beach Houses, & More" />
    <meta property="og:description" content="Find the perfect place to stay at an amazing price in 191 countries. Belong anywhere with WanderLodge." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1542718610-a1d656d1884c?q=80&w=1200&auto=format&fit=crop" />
    <meta property="og:url" content="https://wanderlodge.com/" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WanderLodge | Vacation Rentals, Cabins, Beach Houses, & More" />
    <meta name="twitter:description" content="Find the perfect place to stay at an amazing price in 191 countries. Belong anywhere with WanderLodge." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1542718610-a1d656d1884c?q=80&w=1200&auto=format&fit=crop" />
    
    <!-- Hidden Google Translate Integration -->
    <style>
      /* Hide the ugly Google Translate top bar & frame */
      .goog-te-banner-frame { display: none !important; }
      iframe.goog-te-banner-frame { display: none !important; }
      .skiptranslate > iframe.goog-te-banner-frame { display: none !important; }
      #goog-gt-tt { display: none !important; }
      /* Hide the translation widget completely */
      #google_translate_element { display: none !important; }
      /* Prevent the body from being pushed down by the hidden banner */
      body { top: 0px !important; position: static !important; margin-top: 0px !important; padding-top: 0px !important; }
      html { top: 0px !important; position: static !important; margin-top: 0px !important; padding-top: 0px !important; }
      /* Hide the tooltip that appears on hover over translated text */
      .goog-tooltip { display: none !important; }
      .goog-tooltip:hover { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <!-- Observer to forcefully hide Google Translate UI that bypasses CSS -->
    <script type="text/javascript">
      const observer = new MutationObserver((mutations) => {
        // Remove the banner iframe
        const iframe = document.querySelector('iframe.goog-te-banner-frame');
        if (iframe) iframe.remove();
        
        // Remove the tooltip
        const tooltip = document.getElementById('goog-gt-tt');
        if (tooltip) tooltip.remove();
        
        // Remove injected inline styles from body and html
        if (document.body && document.body.style.top) {
           document.body.style.top = '0px';
        }
        if (document.documentElement && document.documentElement.style.top) {
           document.documentElement.style.top = '0px';
        }
      });
      observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
    </script>
  </body>
</html>
